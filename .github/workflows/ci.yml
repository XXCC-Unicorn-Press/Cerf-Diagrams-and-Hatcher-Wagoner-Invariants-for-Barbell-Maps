name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build LaTeX Document
        uses: xu-cheng/texlive-action@v3
        with:
          os: debian # use debian-based TeX Live image for better compatibility with apt-get
          run: |
            # set non-interactive mode for apt-get to avoid prompts during installation
            export DEBIAN_FRONTEND=noninteractive

            # install Inkscape for SVG to PDF conversion
            apt-get update -y
            apt-get install -y inkscape

            # build the LaTeX document using latexmk with the ONLINE version flag
            chmod +x ./build.sh
            ./build.sh

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target
